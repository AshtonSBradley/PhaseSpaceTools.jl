name: Aqua
on:
  - push
  - pull_request
jobs:
  aqua:
    name: Aqua
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v1
        with:
          version: '1.12'
      - uses: julia-actions/julia-buildpkg@v1
      - run: |
          julia --project=. -e '
            using Pkg
            Pkg.test(; test_args=["Aqua"])'
